<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        :root {
            --caramel: #2b6777;
            --papaya-whip: #c8d8e4;
            --baby-blue: #52ab98;
            --caramel-dark: rgba(43, 103, 119, 0.85);
            --caramel-light: #88a9b2;
            --sky-blue: #c8d8e4;
            --slate-blue: #6A8CAF;
            --cream: #ffffff;
            --warm-sand: #f2f2f2;
            --odoo-primary: #2b6777;
            --odoo-secondary: #c8d8e4;
            --bg-light: #f2f2f2;
            --text-main: #2b6777;
            --text-muted: #6b98a0;
            --white: #FFFFFF;
            --border: #E8D4C4;
            --success: #7CB342;
            --danger: #E74C3C;
            --warning: #F39C12;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(43, 103, 119, 0.1), 0 2px 4px -1px rgba(43, 103, 119, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--cream);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(255, 107, 107, 0.5);
            }

            50% {
                box-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes spin-slow {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse-loading {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes shimmer {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.85rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.3s;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--caramel);
            color: var(--white);
            box-shadow: 0 8px 16px rgba(43, 103, 119, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px rgba(43, 103, 119, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--caramel);
            color: var(--caramel);
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: var(--caramel-dark);
            color: var(--white);
            box-shadow: 0 8px 16px rgba(43, 103, 119, 0.2);
            transform: scale(1.05);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            animation: fadeInUp 0.5s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-success {
            background: #7CB342;
            color: var(--white);
            box-shadow: 0 4px 12px rgba(124, 179, 66, 0.3);
        }

        .badge-warning {
            background: var(--caramel);
            color: var(--white);
            box-shadow: 0 4px 12px rgba(43, 103, 119, 0.3);
        }

        h3 {
            animation: fadeInUp 0.8s ease;
        }

        input:focus,
        select:focus {
            animation: pulse-glow 1s ease infinite;
        }

        html {
            scroll-behavior: smooth;
        }

        ::selection {
            background: var(--caramel);
            color: var(--white);
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(43, 103, 119, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--caramel);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--caramel-dark);
        }

        input,
        select,
        textarea {
            transition: all 0.3s ease;
        }

        input:hover,
        select:hover,
        textarea:hover {
            border-color: var(--caramel) !important;
        }

        input:valid,
        select:valid {
            border-color: var(--success) !important;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .navbar {
            background: var(--caramel);
            color: var(--white);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(43, 103, 119, 0.25);
            position: relative;
            overflow: hidden;
        }

        .navbar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
            z-index: 0;
        }

        .nav-brand {
            font-size: 1.8rem;
            font-weight: 900;
            z-index: 1;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            animation: fadeInUp 0.6s ease;
        }

        .nav-links {
            display: flex;
            align-items: center;
            z-index: 1;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-links button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            cursor: pointer;
            opacity: 0.9;
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-links button:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.3);
            border-color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        .auth-container {
            max-width: 450px;
            margin: 10vh auto;
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: fadeInUp 0.8s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(43, 103, 119, 0.15);
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg, rgba(43, 103, 119, 0.08), rgba(200, 216, 228, 0.08));
            animation: rotate 20s linear infinite;
            z-index: 0;
        }

        .auth-container h2 {
            margin-bottom: 1.5rem;
            color: var(--caramel);
            font-size: 1.8rem;
            font-weight: 800;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            outline: none;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--caramel);
            box-shadow: 0 0 0 3px rgba(43, 103, 119, 0.1);
            background: var(--white);
            transform: scale(1.02);
        }

        .auth-switch {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--caramel);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
            font-weight: 600;
        }

        .auth-switch:hover {
            color: var(--caramel-dark);
            text-decoration: none;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            animation: fadeInUp 0.6s ease backwards;
        }

        .card:nth-child(1) {
            animation-delay: 0.1s;
            border-color: rgba(43, 103, 119, 0.2);
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
            border-color: rgba(200, 216, 228, 0.2);
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
            border-color: rgba(43, 103, 119, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--caramel);
        }

        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(43, 103, 119, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(43, 103, 119, 0.15);
            border-color: rgba(43, 103, 119, 0.4);
        }

        .card:hover::after {
            opacity: 1;
        }

        .card h3 {
            color: var(--caramel);
            margin-bottom: 0.8rem;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(43, 103, 119, 0.1);
            border: 1px solid rgba(43, 103, 119, 0.1);
            animation: fadeInUp 0.8s ease;
        }

        .data-table th {
            background: var(--caramel);
            color: var(--white);
            font-weight: 700;
            padding: 1.2rem;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }

        .data-table td {
            padding: 1rem 1.2rem;
            border-bottom: 2px solid rgba(43, 103, 119, 0.1);
            transition: all 0.3s ease;
        }

        .data-table tbody tr {
            transition: all 0.3s ease;
        }

        .data-table tbody tr:hover {
            background: linear-gradient(90deg, rgba(43, 103, 119, 0.05), rgba(200, 216, 228, 0.05));
            transform: scale(1.01);
            box-shadow: inset 0 0 10px rgba(43, 103, 119, 0.1);
        }

        table tbody tr {
            animation: fadeInUp 0.6s ease backwards;
        }

        table tbody tr:nth-child(1) {
            animation-delay: 0.05s;
        }

        table tbody tr:nth-child(2) {
            animation-delay: 0.1s;
        }

        table tbody tr:nth-child(3) {
            animation-delay: 0.15s;
        }

        table tbody tr:nth-child(4) {
            animation-delay: 0.2s;
        }

        table tbody tr:nth-child(5) {
            animation-delay: 0.25s;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            margin-top: 2.5rem;
            animation: fadeInUp 0.8s ease;
        }

        .section-header h2 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--caramel);
        }

        .panel {
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(43, 103, 119, 0.1);
            max-width: 700px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease;
            border: 2px solid rgba(43, 103, 119, 0.15);
        }
    </style>
</head>

              <tr><td>Operations</td><td>3</td><td>4.1/5 ⭐</td></tr>
            </tbody>
          </table>
        `;
            },
            renderHolidayCalendar(container) {
                container.innerHTML = `
          <div class="panel">
            <div class="section-header"><h2>Holiday Calendar 2026</h2><button class="btn btn-outline" onclick="App.navigate('dashboard')">Back</button></div>
            <table class="data-table">
              <thead><tr><th>Date</th><th>Holiday</th><th>Type</th></tr></thead>
              <tbody>
                ${this.db.holidays.map(h => `
                  <tr><td style="font-weight: bold;">${h.date}</td><td>${h.name}</td><td><span class="badge badge-success">${h.type}</span></td></tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
            },
            renderShiftManagement(container) {
                const userShift = this.db.shifts.filter(s => s.userId === this.currentUser.id);
                container.innerHTML = `
          <div class="panel">
            <div class="section-header"><h2>Shift Management</h2><button class="btn btn-outline" onclick="App.navigate('dashboard')">Back</button></div>
            <table class="data-table">
              <thead><tr><th>Shift Type</th><th>Department</th><th>Start Date</th></tr></thead>
              <tbody>
                ${userShift.map(s => `
                  <tr><td>${s.shiftType}</td><td>${s.department}</td><td>${s.startDate}</td></tr>
                `).join('') || '<tr><td colspan="3" style="text-align: center;">No shift data found.</td></tr>'}
              </tbody>
            </table>
          </div>
        `;
            }
        });

        window.onload = () => App.init();
    </script>
</body>

</html>
